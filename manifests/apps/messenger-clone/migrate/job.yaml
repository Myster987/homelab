apiVersion: batch/v1
kind: Job
metadata:
  name: db-migrate
  namespace: messenger-clone
spec:
  ttlSecondsAfterFinished: 300
  backoffLimit: 3
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: db-migrate
          image: ghcr.io/myster987/messenger-clone-db:latest
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: messenger-clone-secret
                  key: DATABASE_URL
            - name: DATABASE_TOKEN
              valueFrom:
                secretKeyRef:
                  name: messenger-clone-secret
                  key: DATABASE_TOKEN
