apiVersion: apps/v1
kind: Deployment
metadata:
  name: libsql
  namespace: messenger-clone
spec:
  replicas: 1
  selector:
    matchLabels:
      app: libsql
  template:
    metadata:
      labels:
        app: libsql
    spec:
      containers:
        - name: sqld
          image: ghcr.io/tursodatabase/libsql-server:latest
          args:
            - sqld
            - --db-path=/data/iku.db
            - --http-listen-addr=0.0.0.0:8080
          ports:
            - containerPort: 8080
            - containerPort: 5001
          env:
            - name: SQLD_AUTH_JWT_KEY
              valueFrom:
                secretKeyRef:
                  name: messenger-clone-secret
                  key: DATABASE_TOKEN
          volumeMounts:
            - name: data
              mountPath: /data
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: libsql-pvc
