apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: messenger-clone
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: messenger-clone-backend
          image: ghcr.io/myster987/messenger-clone-backend:latest
          ports:
            - containerPort: 4000
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: messenger-clone-secret
                  key: DATABASE_URL
            - name: DATABASE_TOKEN
              valueFrom:
                secretKeyRef:
                  name: messenger-clone-secret
                  key: DATABASE_TOKEN

            - name: CLOUDINARY_CLOUD_NAME
              valueFrom:
                secretKeyRef:
                  name: messenger-clone-secret
                  key: CLOUDINARY_CLOUD_NAME
            - name: CLOUDINARY_API_KEY
              valueFrom:
                secretKeyRef:
                  name: messenger-clone-secret
                  key: CLOUDINARY_API_KEY
            - name: CLOUDINARY_API_SECRET
              valueFrom:
                secretKeyRef:
                  name: messenger-clone-secret
                  key: CLOUDINARY_API_SECRET

            - name: SITE_URL
              valueFrom:
                secretKeyRef:
                  name: messenger-clone-secret
                  key: SITE_URL

            - name: BETTER_AUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: messenger-clone-secret
                  key: BETTER_AUTH_SECRET
            - name: BETTER_AUTH_URL
              valueFrom:
                secretKeyRef:
                  name: messenger-clone-secret
                  key: BETTER_AUTH_URL

          readinessProbe:
            httpGet:
              path: /api/health
              port: 4000
            initialDelaySeconds: 5
            periodSeconds: 10
