apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: authentik-outpost-catch-all
  namespace: networking
spec:
  parentRefs:
    - name: edge
      namespace: networking
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /outpost.goauthentik.io
        - path:
            type: PathPrefix
            value: /static/dist
      backendRefs:
        - name: ak-outpost-authentik-embedded-outpost
          namespace: authentik
          port: 9000
