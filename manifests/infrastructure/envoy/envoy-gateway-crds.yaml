apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: envoy-gateway-crds
  namespace: networking
spec:
  interval: 1h
  chart:
    spec:
      chart: gateway-crds-helm
      version: 1.7.3
      sourceRef:
        kind: HelmRepository
        name: envoy-gateway
        namespace: networking
  values:
    crds:
      gatewayAPI:
        enabled: false
      envoyGateway:
        enabled: true
