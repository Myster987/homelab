apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: envoy-gateway
  namespace: networking
spec:
  interval: 15m
  chart:
    spec:
      chart: gateway-helm
      version: 1.7.3
      sourceRef:
        kind: HelmRepository
        name: envoy-gateway
        namespace: networking
  install:
    crds: CreateReplace
  upgrade:
    crds: CreateReplace
  values:
    crds:
      gatewayAPI:
        enabled: false
      # Only install envoy specifc crds
      envoyGateway:
        enabled: true
    service:
      type: LoadBalancer
