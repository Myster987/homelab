apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: authentik
  namespace: authentik
spec:
  interval: 30m
  chart:
    spec:
      chart: authentik
      version: 2026.2.3
      sourceRef:
        kind: HelmRepository
        name: authentik
        namespace: authentik
      interval: 2h
  values:
    authentik:
      error_reporting:
        enabled: false
      postgresql:
        host: "authentik-pg-rw"

    postgresql:
      enabled: false

    redis:
      enabled: true

    server:
      route:
        main:
          enabled: true
          hostnames:
            - authentik.mikolajmaciejak.dev
          parentRefs:
            - name: edge
              namespace: networking
          additionalRules:
            - backendRefs:
                - name: ak-outpost-authentik-embedded-outpost
                  port: 9000
              matches:
                - path:
                    type: PathPrefix
                    value: /outpost.goauthentik.io

  valuesFrom:
    - kind: Secret
      name: authentik-secret
      valuesKey: secret_key
      targetPath: authentik.secret_key
    - kind: Secret
      name: authentik-db-secret
      valuesKey: password
      targetPath: authentik.postgresql.password
