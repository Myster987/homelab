apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: authentik
  namespace: authentik
spec:
  interval: 30m
  chart:
    spec:
      chart: authentik
      version: 2026.2.2
      sourceRef:
        kind: HelmRepository
        name: authentik
        namespace: authentik
      interval: 2h
  values:
    authentik:
      error_reporting:
        enabled: false

    postgresql:
      enabled: true

    redis:
      enabled: true

    server:
      route:
        main:
          enabled: true
          hostnames:
            - authentik.mikolajmaciejak.dev
          parentRefs:
            - name: edge
              namespace: networking

  valuesFrom:
    - kind: Secret
      name: authentik-secret
      valuesKey: secret_key
      targetPath: authentik.secret_key
    - kind: Secret
      name: authentik-secret
      valuesKey: postgresql_password
      targetPath: authentik.postgresql.password
    - kind: Secret
      name: authentik-secret
      valuesKey: postgresql_password
      targetPath: postgresql.auth.password
