apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: authentik
  namespace: authentik
spec:
  interval: 30m
  chart:
    spec:
      chart: authentik
      version: 2026.2.2
      sourceRef:
        kind: HelmRepository
        name: authentik
        namespace: authentik
      interval: 2h
  values:
    authentik:
      secret_key: ""
      error_reporting:
        enabled: false
      postgresql:
        password: ""

    postgresql:
      enabled: true
      auth:
        password: ""

    redis:
      enabled: true

    server:
      ingress:
        enabled: false

  valuesFrom:
    - kind: Secret
      name: authentik-secret
      valuesKey: secret_key
      targetPath: authentik.secret_key
    - kind: Secret
      name: authentik-secret
      valuesKey: postgresql_password
      targetPath: authentik.postgresql.password
    - kind: Secret
      name: authentik-secret
      valuesKey: postgresql_password
      targetPath: postgresql.auth.password
