apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: messenger-clone-migrate
  namespace: flux-system
spec:
  force: true
  interval: 30m
  path: ./manifests/apps/messenger-clone/migrate
  prune: true
  healthChecks:
    - apiVersion: batch/v1
      kind: Job
      name: db-migrate
      namespace: messenger-clone
  sourceRef:
    kind: GitRepository
    name: flux-system
  decryption:
    provider: sops
    secretRef:
      name: sops-age
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: messenger-clone-apps
  namespace: flux-system
spec:
  interval: 30m
  path: ./manifests/apps/messenger-clone
  prune: true
  dependsOn:
    - name: messenger-clone-migrate
  sourceRef:
    kind: GitRepository
    name: flux-system
  decryption:
    provider: sops
    secretRef:
      name: sops-age
