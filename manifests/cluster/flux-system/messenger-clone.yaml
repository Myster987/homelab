apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: messenger-clone
  namespace: flux-system
spec:
  interval: 30m
  path: ./manifests/apps/messenger-clone
  prune: true
  dependsOn:
    - name: cilium
  sourceRef:
    kind: GitRepository
    name: flux-system
  decryption:
    provider: sops
    secretRef:
      name: sops-age
